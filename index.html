<!-- Firebase Scripts Module (Ver 11.6.1) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, query, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

// Global Environment Configurations
const appId = typeof __app_id !== 'undefined' ? __app_id : 'betting-party-simulator';
const fallbackConfig = {
    apiKey: "dummy-key-for-local-testing",
    authDomain: "dummy.firebaseapp.com",
    projectId: "dummy-project",
    storageBucket: "dummy.appspot.com",
    messagingSenderId: "123456",
    appId: "1:123456:web:123456"
};
const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;

// Initialize Global state object
window.state = {
    role: 'none', // 'none' | 'host' | 'player'
    roomCode: '',
    nickname: '',
    playerId: typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID().substring(0, 8) : 'player_' + Math.floor(Math.random() * 1000),
    playerBudget: 10.00,
    playersList: [],
    roomState: {
        status: 'open', // 'open' | 'locked' | 'settled'
        settlementResults: {} // { marketId: option }
    },
    localBets: {}, // { marketId_option: amount }
    notifications: [],
    isSubmitting: false,
    authCompleted: false,
    debugId: '',
    offlineMode: false
};

// Local Sync broadcast channel to allow zero-config multi-tab demo play on GitHub Pages
let localBroadcast = null;
try {
    localBroadcast = new BroadcastChannel('betting-party-local-broadcast');
} catch (e) {
    console.warn("BroadcastChannel not supported in this environment.", e);
}

// MARKETS Data Structure
const MARKETS = [
    { id: '1x2', label: '90mins Result (1X2)', options: ['1', 'X', '2'], odds: [2.10, 3.40, 3.80] },
    { id: 'adv', label: 'To Advance', options: ['Team A', 'Team B'], odds: [1.65, 2.20] },
    { id: 'ou', label: 'Over/Under 2.5 Goals', options: ['Over', 'Under'], odds: [1.90, 1.90] },
    { id: 'score', label: 'Correct Score Selection', options: ['1-0', '2-1', '0-0', 'Other'], odds: [6.00, 9.00, 8.00, 4.00] },
    { id: 'scorer', label: '1st Goalscorer Choice', options: ['Striker A', 'Midfield B', 'No Goal'], odds: [4.50, 7.50, 12.00] }
];

let app, db, auth;
let authPromise = null;

// Local Storage / Broadcast fallback state management
function broadcastOfflineState() {
    if (!window.state.offlineMode) return;
    const payload = {
        roomCode: window.state.roomCode,
        roomState: window.state.roomState,
        playersList: window.state.playersList
    };
    if (localBroadcast) {
        localBroadcast.postMessage({ type: 'OFFLINE_STATE_SYNC', payload });
    }
    localStorage.setItem(`offline_room_${window.state.roomCode}`, JSON.stringify(payload));
}

function initOfflineSync() {
    if (localBroadcast) {
        localBroadcast.onmessage = (event) => {
            if (!window.state.offlineMode || !window.state.roomCode) return;
            if (event.data && event.data.type === 'OFFLINE_STATE_SYNC') {
                const incoming = event.data.payload;
                if (incoming && incoming.roomCode === window.state.roomCode) {
                    window.state.roomState = incoming.roomState;
                    window.state.playersList = incoming.playersList;
                    
                    // Sync active state if playing in this room
                    if (window.state.role === 'player') {
                        const selfObj = window.state.playersList.find(p => p.playerId === window.state.playerId);
                        if (selfObj) {
                            window.state.localBets = selfObj.bets || {};
                            window.state.lockedIn = selfObj.isLocked || false;
                        }
                    }
                    renderApp();
                }
            }
        };
    }
}

// Guarded Authentication Setup
async function initFirebase() {
    try {
        // Instantly bypass timeouts if we detect placeholder keys on GitHub Pages
        if (firebaseConfig.apiKey === "dummy-key-for-local-testing") {
            throw new Error("Local fallback credentials detected.");
        }
        
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
        
        const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        let userCredential;
        if (token) {
            userCredential = await signInWithCustomToken(auth, token);
        } else {
            userCredential = await signInAnonymously(auth);
        }
        
        window.state.playerId = userCredential.user.uid;
        window.state.debugId = userCredential.user.uid;
        window.state.authCompleted = true;
        renderApp();
    } catch (e) {
        console.warn("Could not handshake with Firebase Cloud. Activating Offline Multi-Tab Simulation Engine:", e);
        window.state.offlineMode = true;
        window.state.authCompleted = true;
        initOfflineSync();
        renderApp();
        setTimeout(() => {
            showToast("Running in Local Demo Mode! Open multiple browser tabs to test multi-device features.", "info");
        }, 800);
    }
}

// Audio feedback synthesizer (Using Web Audio API to prevent external files blocks)
function playSynthSound(type) {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        if (type === 'tap') {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
        } else if (type === 'lock') {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, ctx.currentTime);
            osc.frequency.setValueAtTime(800, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.45);
        } else if (type === 'settle') {
            // Happy victory arpeggio
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
            notes.forEach((freq, idx) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.08);
                gain.gain.setValueAtTime(0.12, ctx.currentTime + idx * 0.08);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + idx * 0.08 + 0.3);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime + idx * 0.08);
                osc.stop(ctx.currentTime + idx * 0.08 + 0.35);
            });
        }
    } catch (err) {
        // Audio output blocked by user interaction policy
    }
}

// Non-alert UI Notifications Panel
function showToast(message, type = "info") {
    const toastContainer = document.getElementById('toast-container');
    if (!toastContainer) return;
    
    const toast = document.createElement('div');
    toast.className = `p-4 rounded-xl shadow-lg flex items-center gap-3 transition-all duration-300 transform translate-y-2 opacity-0 text-sm max-w-sm `;
    if (type === 'error') {
        toast.className += 'bg-red-100 text-red-800 border border-red-200 dark:bg-red-950 dark:text-red-200 dark:border-red-900';
    } else if (type === 'success') {
        toast.className += 'bg-green-100 text-green-800 border border-green-200 dark:bg-green-950 dark:text-green-200 dark:border-green-900';
    } else {
        toast.className += 'bg-blue-100 text-blue-800 border border-blue-200 dark:bg-blue-950 dark:text-blue-200 dark:border-blue-900';
    }
    
    toast.innerHTML = `
        <span class="material-icons text-base">${type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info'}</span>
        <span class="flex-1">${message}</span>
    `;
    
    toastContainer.appendChild(toast);
    setTimeout(() => {
        toast.classList.remove('translate-y-2', 'opacity-0');
    }, 10);
    
    setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-10px]');
        setTimeout(() => toast.remove(), 300);
    }, 4000);
}

// Creates a Room Entry on Firestore or Local Sync Engine
async function handleCreateRoom() {
    if (!window.state.authCompleted) {
        showToast("Authenticating server connection... Please try again in 1 second.", "error");
        return;
    }
    window.state.isSubmitting = true;
    renderApp();
    
    // Generate an clean, unambiguous 4 digit Code
    const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // removed O, I, 1, 0
    let code = '';
    for (let i = 0; i < 4; i++) {
        code += alphabet.charAt(Math.floor(Math.random() * alphabet.length));
    }
    
    if (window.state.offlineMode) {
        window.state.roomCode = code;
        window.state.role = 'host';
        window.state.roomState = {
            roomCode: code,
            status: 'open',
            settlementResults: {}
        };
        window.state.playersList = [];
        playSynthSound('lock');
        showToast(`Local Party Room ${code} initiated! Open a new browser window/tab to join!`, "success");
        broadcastOfflineState();
        window.state.isSubmitting = false;
        renderApp();
        return;
    }
    
    try {
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
        const initialRoomObj = {
            roomCode: code,
            status: 'open',
            settlementResults: {},
            createdAt: new Date().toISOString()
        };
        await setDoc(roomRef, initialRoomObj);
        
        window.state.roomCode = code;
        window.state.role = 'host';
        playSynthSound('lock');
        showToast(`Party Room ${code} successfully initiated!`, "success");
        setupSubscriptions();
    } catch (err) {
        console.error("Room generation failed: ", err);
        showToast("Could not generate cloud party session. Check local connection.", "error");
    } finally {
        window.state.isSubmitting = false;
        renderApp();
    }
}

// Adds a player entry to a specific generated Room Code
async function handleJoinRoom(code, name) {
    if (!window.state.authCompleted) {
        showToast("Waiting on network authorization...", "error");
        return;
    }
    if (!code || code.length !== 4) {
        showToast("Enter a valid 4-character Room Code.", "error");
        return;
    }
    if (!name || name.trim().length === 0) {
        showToast("Please enter a custom nickname.", "error");
        return;
    }
    
    window.state.isSubmitting = true;
    renderApp();
    
    const formattedCode = code.toUpperCase().trim();
    const cleanName = name.trim();
    
    if (window.state.offlineMode) {
        // Look up offline storage data
        const localDataString = localStorage.getItem(`offline_room_${formattedCode}`);
        if (!localDataString) {
            // Attempt to build a local mock room if none exists to assist easy testing
            window.state.roomState = {
                roomCode: formattedCode,
                status: 'open',
                settlementResults: {}
            };
        } else {
            const parsed = JSON.parse(localDataString);
            window.state.roomState = parsed.roomState;
            window.state.playersList = parsed.playersList || [];
        }
        
        window.state.roomCode = formattedCode;
        window.state.nickname = cleanName;
        window.state.role = 'player';
        
        // Add self to players list safely
        const existingPlayerIdx = window.state.playersList.findIndex(p => p.playerId === window.state.playerId);
        const playerObj = {
            playerId: window.state.playerId,
            roomCode: formattedCode,
            name: cleanName,
            bets: {},
            isLocked: false,
            updatedAt: new Date().toISOString()
        };
        if (existingPlayerIdx >= 0) {
            window.state.playersList[existingPlayerIdx] = playerObj;
        } else {
            window.state.playersList.push(playerObj);
        }
        
        playSynthSound('lock');
        showToast(`Joined Local Room ${formattedCode}!`, "success");
        broadcastOfflineState();
        window.state.isSubmitting = false;
        renderApp();
        return;
    }
    
    try {
        // Verify if room code exists
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', formattedCode);
        const roomSnap = await getDoc(roomRef);
        
        if (!roomSnap.exists()) {
            showToast(`Room Code ${formattedCode} not found. Try again.`, "error");
            window.state.isSubmitting = false;
            renderApp();
            return;
        }
        
        // Write player state document
        const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', window.state.playerId);
        await setDoc(playerRef, {
            playerId: window.state.playerId,
            roomCode: formattedCode,
            name: cleanName,
            bets: {},
            isLocked: false,
            updatedAt: new Date().toISOString()
        });
        
        window.state.roomCode = formattedCode;
        window.state.nickname = cleanName;
        window.state.role = 'player';
        window.state.roomState = roomSnap.data();
        
        playSynthSound('lock');
        showToast(`Joined ${formattedCode} successfully!`, "success");
        setupSubscriptions();
    } catch (e) {
        console.error("Join action failed: ", e);
        showToast("Error establishing connection to host cloud.", "error");
    } finally {
        window.state.isSubmitting = false;
        renderApp();
    }
}

// Subscribes to real-time sync of rooms & players
let roomUnsub = null;
let playersUnsub = null;

function setupSubscriptions() {
    if (window.state.offlineMode) return;
    if (roomUnsub) roomUnsub();
    if (playersUnsub) playersUnsub();
    
    const code = window.state.roomCode;
    if (!code) return;
    
    // Subscribe to Room State
    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
    roomUnsub = onSnapshot(roomRef, (snap) => {
        if (snap.exists()) {
            const data = snap.data();
            window.state.roomState = data;
            
            // If the host changes status, make an alert sound for players
            if (window.state.role === 'player') {
                if (data.status === 'settled') {
                    playSynthSound('settle');
                } else if (data.status === 'locked') {
                    playSynthSound('lock');
                }
            }
            renderApp();
        }
    }, (err) => {
        console.error("Subscription to Room State lost: ", err);
    });
    
    // Subscribe to All Players in the App. We filter in JS memory to meet RULE 2 constraints.
    const playersCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
    playersUnsub = onSnapshot(playersCol, (snap) => {
        const activeRoomPlayers = [];
        snap.forEach(docSnap => {
            const data = docSnap.data();
            if (data.roomCode === code) {
                activeRoomPlayers.push({
                    id: docSnap.id,
                    ...data
                });
            }
        });
        window.state.playersList = activeRoomPlayers;
        
        // Sync local stakes from Firestore if current player is updated from another tab
        if (window.state.role === 'player') {
            const selfObj = activeRoomPlayers.find(p => p.playerId === window.state.playerId);
            if (selfObj) {
                window.state.localBets = selfObj.bets || {};
                window.state.lockedIn = selfObj.isLocked || false;
            }
        }
        renderApp();
    }, (err) => {
        console.error("Subscription to Players List lost: ", err);
    });
}

// Client interactive stake increments
async function updateLocalStake(marketId, option, delta) {
    if (window.state.roomState.status !== 'open') {
        showToast("Bets are locked. Host has closed pool changes.", "error");
        return;
    }
    if (window.state.lockedIn) {
        showToast("Unlock slip status or contact host to make revisions.", "error");
        return;
    }
    
    const key = `${marketId}_${option}`;
    const currentStaked = window.state.localBets[key] || 0;
    
    // Calculate total currently staked
    let totalOtherStakes = 0;
    Object.entries(window.state.localBets).forEach(([k, val]) => {
        if (k !== key) totalOtherStakes += val;
    });
    
    const nextVal = Math.max(0, currentStaked + delta);
    if (totalOtherStakes + nextVal > 10.00) {
        showToast("Maximum budget allocation is $10.00 total.", "error");
        return;
    }
    
    window.state.localBets[key] = nextVal;
    if (window.state.localBets[key] === 0) {
        delete window.state.localBets[key];
    }
    
    playSynthSound('tap');
    
    if (window.state.offlineMode) {
        const existingPlayerIdx = window.state.playersList.findIndex(p => p.playerId === window.state.playerId);
        if (existingPlayerIdx >= 0) {
            window.state.playersList[existingPlayerIdx].bets = window.state.localBets;
            window.state.playersList[existingPlayerIdx].updatedAt = new Date().toISOString();
        }
        broadcastOfflineState();
        renderApp();
        return;
    }
    
    // Sync immediate status with cloud
    try {
        const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', window.state.playerId);
        await updateDoc(playerRef, {
            bets: window.state.localBets,
            updatedAt: new Date().toISOString()
        });
    } catch (e) {
        console.error("Failed to sync bet stakes to host cloud: ", e);
    }
    renderApp();
}

async function handleTogglePlayerLock() {
    const isNextLocked = !window.state.lockedIn;
    
    if (window.state.offlineMode) {
        const existingPlayerIdx = window.state.playersList.findIndex(p => p.playerId === window.state.playerId);
        if (existingPlayerIdx >= 0) {
            window.state.playersList[existingPlayerIdx].isLocked = isNextLocked;
            window.state.playersList[existingPlayerIdx].updatedAt = new Date().toISOString();
        }
        window.state.lockedIn = isNextLocked;
        playSynthSound('lock');
        showToast(isNextLocked ? "Locked & Transmitted to Main Board!" : "Stakes Unlocked for Modifications.", "success");
        broadcastOfflineState();
        renderApp();
        return;
    }
    
    try {
        const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', window.state.playerId);
        await updateDoc(playerRef, {
            isLocked: isNextLocked,
            updatedAt: new Date().toISOString()
        });
        window.state.lockedIn = isNextLocked;
        playSynthSound('lock');
        showToast(isNextLocked ? "Locked & Transmitted to Main Board!" : "Stakes Unlocked for Modifications.", "success");
    } catch (e) {
        showToast("Could not transmit lock action.", "error");
    }
    renderApp();
}

async function handleHostSetStatus(nextStatus) {
    if (window.state.offlineMode) {
        window.state.roomState.status = nextStatus;
        if (nextStatus === 'open') {
            window.state.roomState.settlementResults = {};
        }
        playSynthSound('lock');
        showToast(`Game is now ${nextStatus.toUpperCase()}!`, "success");
        broadcastOfflineState();
        renderApp();
        return;
    }
    
    try {
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', window.state.roomCode);
        const updates = { status: nextStatus };
        if (nextStatus === 'open') {
            updates.settlementResults = {};
        }
        await updateDoc(roomRef, updates);
        playSynthSound('lock');
        showToast(`Game is now ${nextStatus.toUpperCase()}!`, "success");
    } catch (e) {
        showToast("Fail to write command update to server.", "error");
    }
}

// Host settlement controls per Market Choice
async function handleSettleMarket(marketId, winningOption) {
    const nextResults = { ...window.state.roomState.settlementResults };
    if (nextResults[marketId] === winningOption) {
        delete nextResults[marketId]; // toggle action
    } else {
        nextResults[marketId] = winningOption;
    }
    
    if (window.state.offlineMode) {
        window.state.roomState.settlementResults = nextResults;
        playSynthSound('tap');
        broadcastOfflineState();
        renderApp();
        return;
    }
    
    try {
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', window.state.roomCode);
        await updateDoc(roomRef, {
            settlementResults: nextResults
        });
        playSynthSound('tap');
    } catch (e) {
        showToast("Unable to write outcome to cloud server.", "error");
    }
}

// Calculation engine to find out who won what
function calculateLeaderboard() {
    const standings = [];
    window.state.playersList.forEach(p => {
        let totalInvested = 0;
        let totalPayout = 0;
        let winCount = 0;
        
        Object.entries(p.bets || {}).forEach(([key, stake]) => {
            totalInvested += stake;
            const [mId, mOpt] = key.split('_');
            const targetMarket = MARKETS.find(m => m.id === mId);
            if (targetMarket) {
                const optIdx = targetMarket.options.indexOf(mOpt);
                const isWinner = window.state.roomState.settlementResults[mId] === mOpt;
                if (isWinner && optIdx !== -1) {
                    totalPayout += stake * targetMarket.odds[optIdx];
                    winCount++;
                }
            }
        });
        
        const netProfit = totalPayout - totalInvested;
        standings.push({
            name: p.name,
            totalInvested,
            totalPayout,
            netProfit,
            winCount,
            isLocked: p.isLocked
        });
    });
    
    return standings.sort((a, b) => b.netProfit - a.netProfit);
}

// Get aggregate pool levels per market option
function getPoolMetrics() {
    const pools = {}; // { marketId_option: { totalStake: 0, playerStakes: [] } }
    
    MARKETS.forEach(m => {
        m.options.forEach(opt => {
            pools[`${m.id}_${opt}`] = { totalStake: 0, backers: [] };
        });
    });
    
    window.state.playersList.forEach(p => {
        Object.entries(p.bets || {}).forEach(([key, stake]) => {
            if (pools[key] && stake > 0) {
                pools[key].totalStake += stake;
                pools[key].backers.push({ name: p.name, stake });
            }
        });
    });
    
    return pools;
}

function renderApp() {
    const root = document.getElementById('app-root');
    if (!root) return;
    
    if (window.state.role === 'none') {
        renderWelcomeScreen(root);
    } else if (window.state.role === 'host') {
        renderHostDashboard(root);
    } else if (window.state.role === 'player') {
        renderPlayerSlip(root);
    }
}

                    </button>
                </div>
                
                ${status === 'settled' ? `

                                        <th class="py-2">Total Staked</th>
                                        <th class="py-2">Correct Selections</th>
                                        <th class="py-2 text-right">Final Payout</th>
                                        <th class="py-2 text-right">Net Return</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${calculateLeaderboard().map((entry, idx) => `

                    </div>

                <!-- MARKET CARDS BOARD -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${MARKETS.map(market => {

                            <div class="p-5 rounded-2xl bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 shadow-sm flex flex-col gap-4">
                                <div class="flex items-center justify-between">
                                    <h3 class="font-bold text-sm tracking-tight text-gray-700 dark:text-gray-300">${market.label}</h3>

}

function renderPlayerSlip(root) {
    const code = window.state.roomCode;
    const nickname = window.state.nickname;
    const status = window.state.roomState.status;
    const settledResults = window.state.roomState.settlementResults;
    const locked = window.state.lockedIn;
    
    // Total currently staked
    let totalStaked = 0;
    Object.values(window.state.localBets).forEach(v => totalStaked += v);
    const balance = 10.00 - totalStaked;
    
    // Header Slip Banner
    root.innerHTML = `
        <div class="flex-1 flex flex-col max-w-md mx-auto w-full bg-white dark:bg-gray-950 shadow-md">
            <!-- Client Header -->
            <div class="p-4 border-b border-gray-200 dark:border-gray-900 bg-gray-50 dark:bg-gray-900 shrink-0 flex items-center justify-between sticky top-0 z-10">
                <div class="flex items-center gap-2">
                    <span class="text-xs bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-300 px-2 py-0.5 rounded-full font-mono font-bold">${code}</span>
                    <span class="text-xs font-semibold max-w-[120px] truncate">${nickname}</span>
                </div>
                
                <button onclick="window.state.role = 'none'; setupSubscriptions();" class="text-xs text-gray-500 hover:text-gray-700">
                    Exit Room
                </button>
            </div>
            
            <!-- Dynamic Wallet & Lock Bar -->
            <div class="p-4 bg-blue-50 dark:bg-blue-950/40 border-b border-blue-100 dark:border-blue-900/60 flex items-center justify-between shrink-0">
                <div>
                    <span class="block text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-wider">Remaining Balance</span>
                    <span class="text-xl font-black font-mono text-blue-700 dark:text-blue-300">$${balance.toFixed(2)}</span>
                    <span class="text-[10px] text-gray-500 block">Total Budget: $10.00 limit</span>
                </div>
                
                <button onclick="handleTogglePlayerLock()" class="px-4 py-2.5 rounded-xl font-bold text-xs tracking-wider uppercase transition shadow-sm ${
                    locked 
                    ? 'bg-amber-100 border border-amber-300 text-amber-800 dark:bg-amber-950 dark:border-amber-900 dark:text-amber-200' 
                    : 'bg-blue-600 text-white hover:bg-blue-700'
                } flex items-center gap-2">
                    <span class="material-icons text-sm">${locked ? 'lock' : 'lock_open'}</span>
                    ${locked ? 'Locked In' : 'Lock Slip'}
                </button>
            </div>
            
            <!-- Match Status banner -->
            <div class="px-4 py-2 text-center text-xs font-semibold ${
                status === 'open' ? 'bg-emerald-100 text-emerald-800 dark:bg-emerald-950 dark:text-emerald-200' :
                status === 'locked' ? 'bg-amber-100 text-amber-800 dark:bg-amber-950 dark:text-amber-200' :
                'bg-indigo-100 text-indigo-800 dark:bg-indigo-950 dark:text-indigo-200'
            }">
                ${status === 'open' ? '🟢 BETS ARE ACTIVE - Add your stakes below' :
                  status === 'locked' ? '🔒 BETS ARE LOCKED - Waiting for Host Settlement' :
                  '🏆 ROUND SETTLED - See payouts on main screen'}
            </div>
            
            <!-- Bet list section -->
            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                ${MARKETS.map(market => {
                    const winner = settledResults[market.id];
                    return `
                        <div class="p-4 rounded-2xl bg-gray-50 dark:bg-gray-900 border border-gray-100 dark:border-gray-800 space-y-3">
                            <h3 class="font-bold text-xs text-gray-500 uppercase tracking-wider">${market.label}</h3>
                            
                            <div class="space-y-2">
                                ${market.options.map((opt, idx) => {
                                    const key = `${market.id}_${opt}`;
                                    const stake = window.state.localBets[key] || 0;
                                    const isWinner = winner === opt;
                                    
                                    let itemBorder = 'border-gray-200 dark:border-gray-800';
                                    let itemBg = 'bg-white dark:bg-gray-950';
                                    if (status === 'settled') {
                                        if (isWinner) {
                                            itemBorder = 'border-green-500 dark:border-green-600';
                                            itemBg = 'bg-green-50 dark:bg-green-950/40';
                                        } else {
                                            itemBorder = 'border-gray-100 dark:border-gray-900 opacity-60';
                                        }
                                    }
                                    
                                    return `
                                        <div class="p-3 rounded-xl border ${itemBorder} ${itemBg} flex items-center justify-between gap-4">
                                            <div class="flex-1">
                                                <div class="flex items-center gap-2">
                                                    <span class="font-bold text-sm text-gray-800 dark:text-gray-200">${opt}</span>
                                                    <span class="text-[11px] text-gray-400 font-mono">@ ${market.odds[idx].toFixed(2)}</span>
                                                </div>
                                                ${status === 'settled' && stake > 0 ? `
                                                    <span class="text-[10px] font-bold block mt-0.5 ${isWinner ? 'text-green-600' : 'text-red-500'}">
                                                        ${isWinner ? `Won: $${(stake * market.odds[idx]).toFixed(2)}` : 'Lost'}
                                                    </span>
                                                ` : ''}
                                            </div>
                                            
                                            <!-- Stake selectors increment / decrement -->
                                            ${status === 'open' && !locked ? `
                                                <div class="flex items-center gap-1">
                                                    <button onclick="updateLocalStake('${market.id}', '${opt}', -1)" class="w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 font-bold text-sm flex items-center justify-center hover:bg-gray-200 transition">-</button>
                                                    <span class="w-8 text-center font-bold text-xs font-mono">${stake > 0 ? `$${stake}` : '-'}</span>
                                                    <button onclick="updateLocalStake('${market.id}', '${opt}', 1)" class="w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 font-bold text-sm flex items-center justify-center hover:bg-gray-200 transition">+</button>
                                                </div>
                                            ` : `
                                                <div class="font-mono font-bold text-sm">
                                                    ${stake > 0 ? `$${stake.toFixed(2)}` : '-'}
                                                </div>
                                            `}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
            
            <!-- Connection Info Footer -->
            <div class="p-4 border-t border-gray-200 dark:border-gray-900 bg-gray-50 dark:bg-gray-900 text-[10px] text-gray-400 text-center flex flex-col gap-1">
                <span>Unique Device Auth Token:</span>
                <code class="font-mono block select-all break-all">${window.state.playerId}</code>
            </div>
        </div>
    `;
}
